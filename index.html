<!DOCTYPE html>
<html>
    <head> 
        <title>Eduloop</title>
        <!--Css for the page-->
        <style>

            html { font-size: 20px;}

            body { background-color: #2d2d2d; margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

            #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 23%; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
            #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; background-color: #464646; color: white; }
            #input:focus { outline: none; }
            #form > button { background: none; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 20rem; outline: none; color: #fff; }

            #messages { list-style-type: none; margin: 0; padding: 0; }
            #messages > li { padding: 0.5rem 1rem; }
            #sidebar {
                margin-top: 3rem;
                align-content: center;
                
            }
            #sidebar > button {
                background: none;
                justify-content: flex-start;
                border: none;
                margin-left: 0rem;
                margin-top: 0rem;
                margin-bottom: 0.3rem;
                margin-right: 0;
                display: flex;
                font-size: 1rem;
                width: 100%;
                color: white;
                box-sizing: box-border;
                border-radius: 0.5rem;
                transition-duration: 0.3s;
            }
            #sidebar > button:hover {
                background-color: grey;
            }

                .bubblefromperson {
                    background-color: rgb(255, 173, 173);
                    position: relative;
                    border-radius: 0rem 0.5rem 0.5rem 0.5rem;
                    padding: 0.3rem;
                    display: inline-block;
                    text-align: left;
                    max-width: 70%;
                    margin-left: 0.1rem;
                    box-shadow: -0.1rem 0.1rem 0.1rem rgb(43, 43, 43);
                }

                .ptriangle.bubblefromperson::before {
                    content: '';
                    position: absolute;
                    left: 0;
                    top: .61rem;
                    width: 0;
                    height: 0;
                    border: 0.5rem solid transparent;
                    border-right-color: rgb(255, 173, 173);
                    border-left: 0;
                    border-top: 0;
                    margin-top: -0.6rem;
                    margin-left: -0.5rem;

                }
                .bubblefromyou {
                    background-color: rgb(164, 199, 255);
                    position: relative;
                    border-radius: 0.5rem 0rem 0.5rem 0.5rem;
                    padding: 0.3rem;
                    display: inline-block;
                    text-align: right;
                    max-width: 70%;
                    margin-right: -0.1rem;
                    box-shadow: 0.1rem 0.1rem 0.1rem rgb(43, 43, 43);
                }

                .triangle.bubblefromyou::after {
                    content: '';
                    position: absolute;
                    right: 0;
                    top: .61rem;
                    width: 0;
                    height: 0;
                    border: 0.5rem solid transparent;
                    border-left-color: rgb(164, 199, 255);
                    border-right: 0;
                    border-top: 0;
                    margin-top: -0.6rem;
                    margin-right: -0.5rem;

                }

                .fromyou {
                    display: inline-block;
                    margin-right: .189rem;
                    word-wrap: break-word;
                    white-space: normal;
                }

                .you {
                    display: flex;
                    justify-content: flex-end;
                }

                .fromperson {
                    white-space: normal;
                    word-wrap: break-word;
                    max-width: 70%;
                    display: inline-block;
                }

                .pfp {
                    width: 1rem;
                    height: 1rem;
                    border-radius: 50%;
                    background-color: rgb(255, 255, 255);
                    margin: 0.3rem;
                    flex-shrink: 0;
                    display: flex;
                    justify-content: flex-start;

                }

                .person {
                    display: flex;
                    justify-content: flex-start;
                }

                .main {
                    margin-left: 23%;
                    
                }

                .container {

                    height: 100%;
                    background-color: rgb(31, 31, 31);
                    position: fixed;
                    z-index: 1;
                    overflow-x: 0;
                    top: 0;
                    left: 0;
                    width: 23%;
                    

                }

                .btu {
                    font-size: 2rem;
                    color: white;
                }

                .openbtn {
                    position: fixed; 
                    left: 0%;
                    background: none;
                    font-size: 1.5rem;
                    outline: none; 
                    font-weight: bold;
                    color: white; 
                    border: none;
                }

            @media (max-width: 1024px) {
                .container {
                    background-color: blue;
                    width: 15%;
                }
                #form {left: 15%;}
            
            }

            .openbtn img {
                width: 50px;
                height: auto;
                object-fit: contain;
            }
            
        </style>
    </head>
    
    <body>
        

        <div id="main" class="main">
            <ul id="messages"></ul>
            <form id="form" action="">
                <input id="input" autocomplete="off"  />
                <button class="btu">+</button>
                <button>🔺</button>
            </form>
        </div>

        <div id= 'mysidebar' class='container'>
            <button class="openbtn" onclick="openNav()"><img src="icons/image.png"></button>
            <div id='sidebar'>
                <button class="buttons">
                    Announcements
                </button>
                <button class="buttons">
                    Main
                </button>
                <button class="buttons">
                    General Chat
                </button>
                <button class="buttons">
                    Memes
                </button>
            </div>
        </div>
    </body>
    <script src="/socket.io/socket.io.js"></script>
    <script> 
        var sidebarLength = document.getElementById('mysidebar');

        function openNav() {
            if (sidebarLength.style.width === "5%"){
                document.getElementById('mysidebar').style.width = '23%';
                document.getElementById('main').style.marginLeft= '23%';
                document.getElementById('form').style.left = "23%";
                Array.from(document.getElementsByClassName("buttons")).forEach(button => {
                    button.style.fontSize="1rem";
                });
            } else {
                document.getElementById('mysidebar').style.width = '5%';
                document.getElementById('form').style.left = "5%";
                document.getElementById('main').style.marginLeft= '5%';
                Array.from(document.getElementsByClassName("buttons")).forEach(button => {
                    button.style.fontSize="0";
                });
            };
        };

        
        var socket = io();

        var form = document.getElementById('form');
        var input = document.getElementById('input');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            var text_bubble = document.createElement('div');
            var pfp = document.createElement('div');

            pfp.className = 'pfp';

            text_bubble.textContent = msg.text;
            if (msg.from === 'your') {
                text_bubble.className = 'bubblefromyou triangle fromyou';
                item.className = 'you';
                item.appendChild(text_bubble);
                item.appendChild(pfp);
            } else {
                text_bubble.className = 'bubblefromperson ptriangle fromperson';
                item.className = 'person';
                item.appendChild(pfp);
                item.appendChild(text_bubble);
            }
            
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });


    </script>
</html>
