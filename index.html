<!DOCTYPE html>
<html>
    <head> 
        <title>Eduloop</title>
        <!--Css for the page-->
        <style>

            html { font-size: 20px;}
            

            body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

            #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
            #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
            #input:focus { outline: none; }
            #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

            #messages { list-style-type: none; margin: 0; padding: 0; }
            #messages > li { padding: 0.5rem 1rem; }
            

            .bubblefromperson {
                background-color: aquamarine;
                position: relative;
                border-radius: 0rem 0.5rem 0.5rem 0.5rem;
                padding: 0.3rem;
                display: inline-block;
                text-align: left;
                max-width: 70%;
            }

            .ptriangle.bubblefromperson::before {
                content: '';
                position: absolute;
                left: 0;
                top: .61rem;
                width: 0;
                height: 0;
                border: 0.5rem solid transparent;
                border-right-color: aquamarine;
                border-left: 0;
                border-top: 0;
                margin-top: -0.6rem;
                margin-left: -0.5rem;

            }
            .bubblefromyou {
                background-color: rgb(127, 176, 255);
                position: relative;
                border-radius: 0.5rem 0rem 0.5rem 0.5rem;
                padding: 0.3rem;
                display: inline-block;
                text-align: right;
                max-width: 70%;
                margin-right: -0.5rem;
            }

            .triangle.bubblefromyou::after {
                content: '';
                position: absolute;
                right: 0;
                top: .61rem;
                width: 0;
                height: 0;
                border: 0.5rem solid transparent;
                border-left-color: rgb(127, 176, 255);
                border-right: 0;
                border-top: 0;
                margin-top: -0.6rem;
                margin-right: -0.5rem;

            }

            .fromyou {
                display: inline-block;
                margin-right: .5rem;
                word-wrap: break-word;
                white-space: normal;
            }

            .you {
                display: flex;
                justify-content: flex-end;
            }

            .fromperson {
                white-space: normal;
                word-wrap: break-word;
                max-width: 70%;
                display: inline-block;
            }

        </style>
    </head>
    
    <body> 
        <!---->
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off"  />
            <button>Send</button>
        </form>
    </body>
    <script src="/socket.io/socket.io.js"></script>
    <script> 
        var socket = io();

        var form = document.getElementById('form');
        var input = document.getElementById('input')

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            var text_bubble = document.createElement('div');

            text_bubble.textContent = msg;
            text_bubble.className = 'bubblefromyou triangle fromyou';
            
            item.appendChild(text_bubble);
            item.className = 'you'

            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });


    </script>
</html>
